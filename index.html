<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Life Balance OS — Perfect Add Activity</title>
<meta name="theme-color" content="#F5EFE4">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ----- RESET & ROOT (keeping original soul) ----- */
  :root{
    --bg:#F5EFE4; --c1:#EDE5D2; --c2:#FFF;
    --ln:#DDD4BC; --ln2:#C8BB9E;
    --tx:#1A160E; --tx2:#3A2E18; --mt:#8A7860; --mt2:#BBAA90;
    --gd:#B88A2E; --gd2:#C89840; --gdf:rgba(168,120,40,.10);
    --work:#B88A2E; --life:#4CAF50; --slp:#3B82F6;
    --nh:72px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden}
  #app{max-width:500px;margin:0 auto;height:100vh;display:flex;flex-direction:column;background:var(--bg);position:relative}
  .V{display:none;flex:1;flex-direction:column;overflow:hidden}
  .V.on{display:flex}
  .nav{
    height:78px;background:rgba(245,239,228,.98);backdrop-filter:blur(18px);
    border-top:1px solid var(--ln);display:flex;align-items:center;justify-content:space-around;
    padding:6px 12px 12px;flex-shrink:0;
  }
  .nb, .nav-add-center{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:6px 4px;cursor:pointer;
    border-radius:20px;transition:0.1s;
  }
  .nb-ic{font-size:28px;font-family:'Cormorant Garamond',serif;color:#2A1C12;width:46px;height:46px;display:flex;align-items:center;justify-content:center;border-radius:28px;}
  .nb.on .nb-ic{background:#EFE6D3;}
  .nb-lb{font-size:14px;font-weight:500;color:#2A1C12;}
  .nav-add-center .nb-ic{background:#B88A2E;color:white;box-shadow:0 4px 12px rgba(184,138,46,0.3);}
  /* full screen sheet add activity */
  .sh-ov{
    position:fixed;inset:0;background:rgba(30,20,12,0.6);backdrop-filter:blur(10px);z-index:200;
    display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s ease;
  }
  .sh-ov.O{opacity:1;pointer-events:all;}
  .sh{
    width:100%;max-width:500px;margin:0 auto;background:#F5EFE4;border-radius:32px 32px 0 0;
    transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.2,0.9,0.4,1.1);
    height:92vh;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;
    box-shadow:0 -8px 30px rgba(0,0,0,0.12);
  }
  .sh-ov.O .sh{transform:translateY(0);}
  .sh-h{width:48px;height:5px;background:#C8BB9E;border-radius:12px;margin:12px auto 8px;flex-shrink:0;}
  .sh-scroll{
    flex:1;overflow-y:auto;padding:8px 20px 28px;display:flex;flex-direction:column;gap:18px;
    -webkit-overflow-scrolling:touch;
  }
  /* next slot & time row */
  .next-slot-card{
    background:#FEFAF2;border-radius:28px;padding:14px 18px;border-left:5px solid var(--gd);
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.02);
  }
  .next-slot-text{font-weight:600;font-size:16px;color:#2A1C12;}
  .next-slot-btn{background:var(--gd);border:none;padding:8px 20px;border-radius:40px;color:white;font-weight:600;cursor:pointer;}
  .time-row-sticky{
    background:#F5EFE4;position:sticky;bottom:0;padding:12px 0 8px;border-top:1px solid var(--ln);
    margin-top:8px;z-index:22;
  }
  .time-grid{display:flex;gap:16px;background:#FEFAF2;border-radius:28px;padding:12px 18px;border:1px solid #DDD4BC;}
  .time-field{flex:1;}
  .sh-lbl{font-size:12px;font-weight:700;letter-spacing:0.1em;color:#8A7860;margin-bottom:6px;}
  .sh-inp{width:100%;padding:14px 12px;background:white;border:1.2px solid #DDD4BC;border-radius:28px;font-size:18px;font-family:'DM Mono',monospace;font-weight:500;color:#2A1C12;text-align:center;}
  .sphere-filter-row{display:flex;gap:10px;flex-wrap:wrap;margin:6px 0 8px;}
  .sphere-pill{background:white;border:1px solid #DDD4BC;padding:8px 18px;border-radius:40px;font-weight:600;font-size:14px;cursor:pointer;transition:all 0.1s;}
  .sphere-pill.active{background:var(--gd);border-color:var(--gd);color:white;}
  .activity-scroll-area{flex:1;min-height:240px;display:flex;flex-direction:column;gap:12px;margin-bottom:12px;}
  .act-card{background:white;border-radius:24px;border:1px solid #E7DFCF;overflow:hidden;transition:0.08s;}
  .act-card.selected{border-left:6px solid var(--gd);background:#FFFCF5;}
  .act-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;}
  .act-color-dot{width:10px;height:10px;border-radius:12px;background:var(--gd);}
  .act-title{font-size:18px;font-weight:600;color:#2A1C12;}
  .act-sub{font-size:13px;color:#8A7860;}
  .tasks-area{padding:0 16px 16px 16px;border-top:1px solid #F0E8DA;background:#FEFAF2;}
  .task-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #EDE5D2;cursor:pointer;}
  .task-check{width:24px;height:24px;border-radius:30px;border:2px solid #C8BB9E;display:flex;align-items:center;justify-content:center;font-size:14px;background:white;}
  .task-item.selected .task-check{background:var(--gd);border-color:var(--gd);color:white;}
  .quick-add-mini{background:#FFF3E4;border-radius:24px;padding:14px;margin:4px 0;}
  .quick-row{display:flex;gap:10px;margin-top:10px;}
  .small-input{flex:1;padding:12px;border-radius:32px;border:1px solid #DDD4BC;background:white;font-size:15px;}
  .file-area{margin:8px 0;padding:12px 0;}
  .file-preview{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .file-tag{background:#EDE5D2;border-radius:20px;padding:4px 12px;font-size:12px;}
  .sh-ok{background:var(--gd);border:none;padding:18px;border-radius:60px;font-size:19px;font-weight:700;color:white;width:100%;margin-top:10px;margin-bottom:6px;cursor:pointer;box-shadow:0 4px 12px rgba(184,138,46,0.3);}
  .sh-scroll::-webkit-scrollbar{width:4px;}
  .sh-scroll::-webkit-scrollbar-track{background:#EDE5D2;border-radius:10px;}
  .sh-scroll::-webkit-scrollbar-thumb{background:#B88A2E;border-radius:10px;}
  /* calendar minimal */
  .cal-mock{display:flex;align-items:center;justify-content:center;height:100%;font-size:26px;font-family:'Cormorant Garamond';color:#8A7860;}
</style>
</head>
<body>
<div id="app">
  <div class="V on" id="V-cal"><div class="cal-mock">📅 Life Balance OS — Tap + Add activity</div></div>
  <div class="V" id="V-sph"><div class="cal-mock">◎ Spheres view ready</div></div>
  <div class="nav">
    <div class="nb" data-v="cal" onclick="goV('cal')"><div class="nb-ic">◈</div><div class="nb-lb">Calendar</div></div>
    <div class="nav-add-center" id="globalAddBtn"><div class="nb-ic">+</div><div class="nb-lb">Add</div></div>
    <div class="nb" data-v="sph" onclick="goV('sph')"><div class="nb-ic">◎</div><div class="nb-lb">Spheres</div></div>
  </div>
</div>

<!-- FULL SCREEN ADD ACTIVITY SHEET (REDESIGNED) -->
<div class="sh-ov" id="sh-add">
  <div class="sh">
    <div class="sh-h"></div>
    <div class="sh-scroll" id="addScrollRoot">
      <!-- next free slot -->
      <div class="next-slot-card" id="nextSlotWidget">
        <span class="next-slot-text">⏰ Next free slot: <strong id="nextSlotTime">—</strong></span>
        <button class="next-slot-btn" id="useNextSlotBtn">Use this</button>
      </div>
      <!-- sphere filter -->
      <div>
        <div class="sh-lbl">SPHERE</div>
        <div class="sphere-filter-row" id="sphereFilterRow"></div>
      </div>
      <!-- activities list (scrollable huge) -->
      <div class="activity-scroll-area" id="activityListArea">
        <div class="sh-lbl">ACTIVITIES</div>
        <div id="activityCardsContainer" style="display:flex;flex-direction:column;gap:12px;"></div>
      </div>
      <!-- quick add new activity -->
      <div class="quick-add-mini">
        <div class="sh-lbl">➕ NEW ACTIVITY</div>
        <input type="text" id="newQuickActTitle" placeholder="e.g., Deep Work" class="small-input">
        <div class="quick-row">
          <select id="newActSphereSelect" class="small-input"></select>
          <button id="quickAddActBtn" class="next-slot-btn" style="background:#8A7860;">Add</button>
        </div>
      </div>
      <!-- TIME ROW (sticky bottom inside scroll) -->
      <div class="time-row-sticky">
        <div class="time-grid">
          <div class="time-field"><div class="sh-lbl">START</div><input type="time" id="sh-st" class="sh-inp" value="09:00"></div>
          <div class="time-field"><div class="sh-lbl">END</div><input type="time" id="sh-end" class="sh-inp" value="10:00"></div>
        </div>
      </div>
      <!-- FILES -->
      <div class="file-area">
        <div class="sh-lbl">📎 FILES</div>
        <input type="file" id="activityFilesInput" multiple style="margin-top:6px; font-size:13px;">
        <div class="file-preview" id="filePreviewDiv"></div>
      </div>
      <!-- confirm button -->
      <button class="sh-ok" id="finalConfirmAddBtn">+ Add to calendar</button>
    </div>
  </div>
</div>

<script>
  // ---------- DATA LAYER (fully functional) ----------
  let S = {
    spheres: [
      {id:'career', name:'Career', band:'work', color:'#B88A2E', goals:[], activities:[]},
      {id:'health', name:'Health', band:'life', color:'#4CAF50', goals:[], activities:[]},
      {id:'sleep', name:'Sleep', band:'sleep', color:'#3B82F6', goals:[], activities:[]}
    ],
    cal: {},
    big3: {}
  };
  function gsp(id){ return S.spheres.find(s=>s.id===id); }
  function uid(){ return Math.random().toString(36).slice(2,9); }
  function saveToLocal(){ try{ localStorage.setItem('lbos_final', JSON.stringify({spheres:S.spheres, cal:S.cal})); }catch(e){} }
  function loadLocal(){ try{ let raw=localStorage.getItem('lbos_final'); if(raw){ let p=JSON.parse(raw); if(p.spheres) S.spheres=p.spheres; if(p.cal) S.cal=p.cal; } }catch(e){} }
  
  // ensure sample activities
  function ensureActivities(){
    S.spheres.forEach(s=>{
      if(!s.goals || !s.goals.length) s.goals = [{id:uid(), text:'Primary', term:'', activities:[]}];
      s.goals.forEach(g=>{
        if(!g.activities) g.activities = [];
        if(g.activities.length===0){
          if(s.id==='career') g.activities.push({id:uid(), title:'Focus sprint', tasks:[{id:uid(), text:'Plan week', done:false},{id:uid(), text:'Deep work 90min', done:false}]});
          else if(s.id==='health') g.activities.push({id:uid(), title:'Outdoor walk', tasks:[{id:uid(), text:'30min cardio', done:false}]});
          else if(s.id==='sleep') g.activities.push({id:uid(), title:'Night routine', tasks:[{id:uid(), text:'No screens', done:false}]});
          else g.activities.push({id:uid(), title:'Reflect', tasks:[{id:uid(), text:'Journal', done:false}]});
        }
      });
    });
  }
  ensureActivities();

  function allActivitiesFlat(){
    let list=[];
    S.spheres.forEach(s=>{
      s.goals.forEach(g=>{
        g.activities.forEach(a=>{
          list.push({sphere:s, goal:g, activity:a});
        });
      });
    });
    return list;
  }

  // selected activity state
  let selectedActivity = null;
  let selectedTasksMap = {}; // task id -> boolean

  // ----- next free slot logic based on current day calendar events
  function getTodayKey(){ let d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
  function getNextFreeSlot(){
    const todayKey = getTodayKey();
    const events = S.cal[todayKey] || [];
    let occupied = events.map(ev => ({ start: ev.startMin || 0, end: (ev.startMin||0) + (ev.dur||60) }));
    occupied.sort((a,b)=>a.start-b.start);
    let candidate = 9*60; // 9am
    for(let occ of occupied){
      if(candidate + 30 <= occ.start) break;
      candidate = Math.max(candidate, occ.end);
    }
    if(candidate >= 22*60) candidate = 9*60;
    let end = Math.min(candidate + 60, 22*60);
    return {start: candidate, end: end};
  }
  function minutesToTime(min){ let h=Math.floor(min/60); let m=min%60; return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`; }
  function updateNextSlotUI(){
    let slot = getNextFreeSlot();
    let span = document.getElementById('nextSlotTime');
    if(span) span.innerText = `${minutesToTime(slot.start)} – ${minutesToTime(slot.end)}`;
    let btn = document.getElementById('useNextSlotBtn');
    if(btn){
      btn.onclick = () => {
        let stInp = document.getElementById('sh-st');
        let enInp = document.getElementById('sh-end');
        if(stInp) stInp.value = minutesToTime(slot.start);
        if(enInp) enInp.value = minutesToTime(slot.end);
      };
    }
  }

  // render sphere pills + filter
  function renderSphereFilters(){
    let container = document.getElementById('sphereFilterRow');
    if(!container) return;
    let currentSphereId = selectedActivity ? selectedActivity.sphere.id : (S.spheres[0]?.id);
    container.innerHTML = S.spheres.map(s => `<div class="sphere-pill ${currentSphereId===s.id ? 'active' : ''}" data-sphere="${s.id}">${s.name}</div>`).join('');
    document.querySelectorAll('.sphere-pill').forEach(pill => {
      pill.addEventListener('click', (e) => {
        let sid = pill.dataset.sphere;
        let newAct = allActivitiesFlat().find(a=>a.sphere.id === sid);
        if(newAct){
          selectedActivity = newAct;
          selectedTasksMap = {};
          (selectedActivity.activity.tasks||[]).forEach(t=> selectedTasksMap[t.id]=true);
        } else {
          let first = allActivitiesFlat().find(a=>a.sphere.id === sid);
          if(first){ selectedActivity = first; selectedTasksMap = {}; first.activity.tasks?.forEach(t=> selectedTasksMap[t.id]=true); }
        }
        renderActivityCards();
        renderSphereFilters();
        renderFilePreview();
      });
    });
  }

  function renderActivityCards(){
    let container = document.getElementById('activityCardsContainer');
    if(!container) return;
    let currentSphereId = selectedActivity ? selectedActivity.sphere.id : (S.spheres[0]?.id);
    let filtered = allActivitiesFlat().filter(a=>a.sphere.id === currentSphereId);
    container.innerHTML = filtered.map(item => {
      let isSelected = selectedActivity && selectedActivity.activity.id === item.activity.id;
      let tasks = item.activity.tasks || [];
      return `<div class="act-card ${isSelected ? 'selected' : ''}" data-actid="${item.activity.id}">
        <div class="act-header" data-actpicker="${item.activity.id}">
          <div class="act-color-dot" style="background:${item.sphere.color}"></div>
          <div style="flex:1"><div class="act-title">${escapeHtml(item.activity.title)}</div><div class="act-sub">${item.sphere.name} · ${item.goal.text}</div></div>
          <div>${isSelected ? '✓' : '›'}</div>
        </div>
        ${isSelected ? `<div class="tasks-area">
          ${tasks.map(t => `<div class="task-item ${selectedTasksMap[t.id] ? 'selected' : ''}" data-taskid="${t.id}">
            <div class="task-check">${selectedTasksMap[t.id] ? '✓' : ''}</div>
            <div style="flex:1; font-size:16px;">${escapeHtml(t.text)}</div>
          </div>`).join('')}
          ${tasks.length===0 ? '<div style="padding:12px; text-align:center;color:#8A7860;">No tasks — activity block will be added</div>' : ''}
        </div>` : ''}
      </div>`;
    }).join('');
    // attach listeners
    document.querySelectorAll('.act-header').forEach(header => {
      let actId = header.dataset.actpicker;
      let found = allActivitiesFlat().find(a=>a.activity.id === actId);
      if(found){
        header.addEventListener('click', (e) => {
          e.stopPropagation();
          selectedActivity = found;
          selectedTasksMap = {};
          (selectedActivity.activity.tasks||[]).forEach(t=> selectedTasksMap[t.id]=true);
          renderActivityCards();
          renderSphereFilters();
          renderFilePreview();
        });
      }
    });
    document.querySelectorAll('.task-item').forEach(taskDiv => {
      let tid = taskDiv.dataset.taskid;
      taskDiv.addEventListener('click', (e) => {
        e.stopPropagation();
        if(selectedTasksMap[tid]) delete selectedTasksMap[tid];
        else selectedTasksMap[tid] = true;
        renderActivityCards();
        renderFilePreview();
      });
    });
  }

  function renderFilePreview(){
    let input = document.getElementById('activityFilesInput');
    let previewDiv = document.getElementById('filePreviewDiv');
    if(input && input.files && previewDiv){
      let arr = Array.from(input.files);
      previewDiv.innerHTML = arr.map(f => `<span class="file-tag">📄 ${escapeHtml(f.name.slice(0,25))}</span>`).join('') || '<span style="opacity:0.6;">no files</span>';
    }
  }

  function escapeHtml(str){ return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  // confirm add to calendar with full data
  function addToCalendar(){
    if(!selectedActivity){ alert("Please select an activity first."); return; }
    let startStr = document.getElementById('sh-st').value;
    let endStr = document.getElementById('sh-end').value;
    let sMin = toMin(startStr);
    let eMin = toMin(endStr);
    if(eMin <= sMin){ alert("End time must be after start time"); return; }
    let dur = eMin - sMin;
    let todayKey = getTodayKey();
    if(!S.cal[todayKey]) S.cal[todayKey] = [];
    let selectedTasksArr = (selectedActivity.activity.tasks||[]).filter(t => selectedTasksMap[t.id]);
    let blockTitle = selectedTasksArr.length===1 ? selectedTasksArr[0].text : (selectedTasksArr.length>1 ? selectedTasksArr[0].text+' + '+(selectedTasksArr.length-1)+' tasks' : selectedActivity.activity.title);
    let files = [];
    let fileInput = document.getElementById('activityFilesInput');
    if(fileInput && fileInput.files){
      files = Array.from(fileInput.files).map(f=>({name:f.name, size:f.size, type:f.type}));
    }
    S.cal[todayKey].push({
      id: uid(), title: blockTitle, activityTitle: selectedActivity.activity.title,
      sphId: selectedActivity.sphere.id, goalId: selectedActivity.goal.id, activityId: selectedActivity.activity.id,
      band: selectedActivity.sphere.band, startMin: sMin, dur: dur,
      tasks: selectedTasksArr.map(t=>({id:uid(), sourceTaskId:t.id, text:t.text, done:false})),
      files: files, done: false
    });
    saveToLocal();
    closeAddSheet();
    alert("✓ Activity added to your calendar");
    renderCalendarMock();
  }
  function toMin(t){ let [hh,mm]=t.split(':'); return parseInt(hh)*60+parseInt(mm); }
  function closeAddSheet(){ document.getElementById('sh-add').classList.remove('O'); }
  function openAddSheet(){
    if(!selectedActivity){
      let first = allActivitiesFlat()[0];
      if(first){
        selectedActivity = first;
        selectedTasksMap = {};
        (first.activity.tasks||[]).forEach(t=> selectedTasksMap[t.id]=true);
      }
    }
    renderSphereFilters();
    renderActivityCards();
    updateNextSlotUI();
    renderFilePreview();
    let slot = getNextFreeSlot();
    let stInp = document.getElementById('sh-st');
    let enInp = document.getElementById('sh-end');
    if(stInp) stInp.value = minutesToTime(slot.start);
    if(enInp) enInp.value = minutesToTime(slot.end);
    document.getElementById('sh-add').classList.add('O');
  }

  // quick add activity
  function quickAddActivity(){
    let title = document.getElementById('newQuickActTitle').value.trim();
    let sphereId = document.getElementById('newActSphereSelect').value;
    if(!title){ alert("Write activity name"); return; }
    let sphere = S.spheres.find(s=>s.id===sphereId);
    if(!sphere) return;
    if(!sphere.goals.length) sphere.goals.push({id:uid(), text:'Main', activities:[]});
    let goal = sphere.goals[0];
    let newAct = {id:uid(), title:title, tasks:[]};
    goal.activities.push(newAct);
    saveToLocal();
    selectedActivity = {sphere, goal, activity: newAct};
    selectedTasksMap = {};
    renderSphereFilters();
    renderActivityCards();
    document.getElementById('newQuickActTitle').value = '';
    alert(`✨ Activity "${title}" added`);
  }

  function renderCalendarMock(){ /* keep UI calm */ }
  function goV(v){
    document.querySelectorAll('.V').forEach(el=>el.classList.remove('on'));
    document.getElementById(`V-${v}`).classList.add('on');
    document.querySelectorAll('.nb').forEach(n=>n.classList.remove('on'));
    let target = document.querySelector(`.nb[data-v="${v}"]`);
    if(target) target.classList.add('on');
  }

  // populate sphere selector for quick add
  function populateSphereSelect(){
    let sel = document.getElementById('newActSphereSelect');
    if(sel) sel.innerHTML = S.spheres.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  }

  // attach event listeners and init
  function initApp(){
    loadLocal();
    ensureActivities();
    populateSphereSelect();
    if(!selectedActivity){
      let allActs = allActivitiesFlat();
      if(allActs.length) selectedActivity = allActs[0];
      if(selectedActivity) (selectedActivity.activity.tasks||[]).forEach(t=> selectedTasksMap[t.id]=true);
    }
    document.getElementById('globalAddBtn')?.addEventListener('click', openAddSheet);
    document.getElementById('finalConfirmAddBtn')?.addEventListener('click', addToCalendar);
    document.getElementById('quickAddActBtn')?.addEventListener('click', quickAddActivity);
    document.getElementById('activityFilesInput')?.addEventListener('change', renderFilePreview);
    // initial ui
    renderSphereFilters();
    renderActivityCards();
    updateNextSlotUI();
    renderFilePreview();
  }
  initApp();
</script>
</body>
</html>
